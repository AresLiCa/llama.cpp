name: Build llama.cpp server (CUDA 13)

on:
  push:
    branches:
      - feature/mtp-gpu-control
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-cuda13-server:
    name: Build server with CUDA 13
    # Run on standard Ubuntu runner (no GPU needed for compilation)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with CUDA 13 Docker image
        run: |
          # Use nvidia/cuda:13.1.2-devel-ubuntu24.04 as build container (official approach)
          docker pull nvidia/cuda:13.1.2-devel-ubuntu24.04
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e CC=gcc -e CXX=g++ -e CUDAHOSTCXX=g++ \
            nvidia/cuda:13.1.2-devel-ubuntu24.04 \
            bash -c "
              apt-get update && \
              apt-get install -y gcc g++ build-essential cmake python3 git libssl-dev libgomp1 && \
              cmake -B build -DGGML_CUDA=ON -DGGML_CPU_ALL_VARIANTS=ON -DLLAMA_BUILD_TESTS=OFF && \
              cmake --build build --config Release -j\$(nproc)
            "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-cuda13
          path: build/bin/llama-server
          retention-days: 7
